name: Content checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  chess-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Stockfish
        run: sudo apt-get update && sudo apt-get install -y stockfish
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install chess
      - name: Verify every FEN, puzzle and move-line with the engine
        run: python scripts/chess-check.py
      - name: Verify every internal link resolves
        run: python scripts/link-check.py
